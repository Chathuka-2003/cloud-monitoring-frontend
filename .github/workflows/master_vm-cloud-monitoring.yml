name: Build and deploy Node.js app

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # bump to v5 when available, or set FORCE flag
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Install dependencies and build
        run: |
          npm install
          npm run build --if-present
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: .   # adjust to your build output folder, e.g. ./build or ./dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app

      # ✅ ADD THIS — Azure login before any Azure action
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}   # your Azure Web App name
          package: .
